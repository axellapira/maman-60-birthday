    if (countryH2 && !countryH2.dataset.split) {
      splitChars(countryH2, 0.06, 0.4);
      countryH2.dataset.split = '1';
    } else if (countryH2) {
      retrigger(countryH2, 0.06, 0.4);
    }

    // 5) ornaments + decor + paragraphs: stagger reveal-up
    // skip cover-* elements — those have their own dedicated CSS animations
    const isCover = pageEl.classList.contains('cover');
    const decorSelector = isCover
      ? '.message-decor, .ornament, .message-from, .country-line, .country-subtitle, .gallery-title, .country-flag'
      : '.message-decor, .ornament, .message-from, .country-line, .country-subtitle, .cover-eyebrow, .cover-subtitle, .cover-date, .gallery-title, .country-flag';
    const targets = pageEl.querySelectorAll(decorSelector);
    targets.forEach((el, i) => {
      el.style.animation = 'none'; void el.offsetWidth;
      el.style.animation = `reveal-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) ${0.4 + i * 0.08}s both`;
    });

    // 6) message body paragraphs — cascade
    const paragraphs = pageEl.querySelectorAll('.message-body p, .intro p, .surprise p');
    paragraphs.forEach((p, i) => {
      p.style.animation = 'none'; void p.offsetWidth;
      p.style.animation = `reveal-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) ${0.6 + i * 0.12}s both`;
    });

    // 7) photos in cards — bloom in
    const photos = pageEl.querySelectorAll('.photo-card');
    photos.forEach((p, i) => {
      p.style.animation = 'none'; void p.offsetWidth;
      // preserve tilt
      const isTiltL = p.classList.contains('tilt-l');
      const isTiltR = p.classList.contains('tilt-r');
      const tilt = isTiltL ? '-1.5deg' : isTiltR ? '1.5deg' : '0deg';
      p.style.setProperty('--r', tilt);
      p.style.animation = `polaroid-drop 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) ${0.5 + i * 0.15}s both`;
    });

    // 8) gallery polaroids inside cards — keep their per-child rotation
    const gridPhotos = pageEl.querySelectorAll('.gallery-grid .photo-card');
    gridPhotos.forEach((p, i) => {
      p.style.animation = 'none'; void p.offsetWidth;
      p.style.animation = `polaroid-drop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) ${0.7 + i * 0.08}s both`;
    });

    // 9) hearts + ornaments inside content
    const hearts = pageEl.querySelectorAll('.heart');
    hearts.forEach((h, i) => {
      h.style.animation = 'none'; void h.offsetWidth;
      h.style.animation = `heart-bloom 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) ${0.8 + i * 0.2}s both, pulse 2s ease-in-out infinite ${1.7 + i * 0.2}s`;
    });

    // 10) family tree: cascade names
    const treeNames = pageEl.querySelectorAll('.ftg-name, .ftg-cousin-name');
    treeNames.forEach((n, i) => {
      n.style.animation = 'none'; void n.offsetWidth;
      n.style.animation = `reveal-fade 0.6s ease-out ${0.4 + i * 0.08}s both`;
    });

    // sparkles for cover & country pages
    if (pageEl.classList.contains('cover') || pageEl.classList.contains('country') || pageEl.classList.contains('surprise')) {
      spawnSparkles(pageEl, 8);
    }
  }

  function splitChars(el, stagger, baseDelay) {
    const text = el.textContent;
    el.textContent = '';
    [...text].forEach((c, i) => {
      const span = document.createElement('span');
      span.className = 'reveal-char';
      span.style.setProperty('--d', (baseDelay + i * stagger) + 's');
      span.textContent = c === ' ' ? '\u00A0' : c;
      el.appendChild(span);
    });
  }
  function retrigger(el, stagger, baseDelay) {
    el.querySelectorAll('.reveal-char').forEach((s, i) => {
      s.style.animation = 'none'; void s.offsetWidth;
      s.style.setProperty('--d', (baseDelay + i * stagger) + 's');
      s.style.animation = '';
    });
  }

  function spawnSparkles(parent, count) {
    const paper = parent.querySelector('.paper');
    if (!paper) return;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      s.className = 'sparkle';
      s.textContent = '✦';
      s.style.left = (10 + Math.random() * 80) + '%';
      s.style.top = (10 + Math.random() * 80) + '%';
      s.style.setProperty('--d', (0.6 + Math.random() * 1.5) + 's');
      s.style.fontSize = (10 + Math.random() * 16) + 'px';
      paper.appendChild(s);
      setTimeout(() => s.remove(), 2500);
    }
  }

  // ============================================================
  // ✨ AMBIENT PETALS + GOLD FLECKS
  // ============================================================
  function spawnPetals() {
    const container = document.getElementById('petals');
    if (!container) return;

    function add(type) {
      const el = document.createElement('span');
      el.className = type;
      const dur = type === 'petal'
        ? 14 + Math.random() * 14
        : 18 + Math.random() * 14;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = -Math.random() * dur + 's';
      if (type === 'petal') {
        const size = 8 + Math.random() * 10;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
      }
      container.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000);
    }

    // initial seed — gold flecks only, sparse
    for (let i = 0; i < 6; i++) add('fleck');

    // ongoing
    setInterval(() => add('fleck'), 3500);
  }
  if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
    spawnPetals();
  }

  function updateUI() {
    document.getElementById('counterText').textContent =
      String(currentPage + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');
    document.getElementById('progressFill').style.width =
      ((currentPage) / (total - 1) * 100) + '%';
    document.getElementById('prevBtn').classList.toggle('disabled', currentPage === 0);
    document.getElementById('nextBtn').classList.toggle('disabled', currentPage === total - 1);
    if (currentPage > 1) document.getElementById('hint').classList.add('hidden');
  }

  // ============================================================
  // CONTROLS
  // ============================================================
  document.getElementById('nextBtn').addEventListener('click', next);
  document.getElementById('prevBtn').addEventListener('click', prev);

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('toc').classList.contains('open')) {
      if (e.key === 'Escape') closeToC();
      return;
    }
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'Escape' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') closeLightbox();
      return;
    }
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    if (e.key === 'Home') goTo(0, 'prev');
    if (e.key === 'End') goTo(total - 1, 'next');
  });

  // touch swipe
  let touchStartX = 0;
  let touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) next(); else prev();
    }
  });

  document.addEventListener('click', (e) => {
    if (e.target.closest('.nav-arrow, .menu-button, .toc, .lightbox, img, .photo-card, .polaroid, button, a')) return;
    const w = window.innerWidth;
    const x = e.clientX;
    if (x < w * 0.12) prev();
    else if (x > w * 0.88) next();
  });

  // ============================================================
  // TABLE OF CONTENTS
  // ============================================================
  function buildToC() {
    const sections = [];
    let current = null;
    pages.forEach((p, i) => {
      if (p.type === 'cover' || p.type === 'intro' || p.type === 'surprise' || p.type === 'ricciuti') {
        if (!current || current.title !== '~') {
          current = { title: '~', items: [] };
          sections.push(current);
        }
        const labels = {
          cover: 'Couverture', intro: 'Introduction',
          surprise: 'Pour finir', ricciuti: 'Ricciuti Family'
        };
        current.items.push({ label: labels[p.type], idx: i });
      } else if (p.type === 'country') {
        current = { title: p.section, items: [] };
        sections.push(current);
      } else if (p.type === 'message') {
        if (current) current.items.push({ label: p.author, idx: i });
      }
    });

    const html = sections.map(s => `
      <div class="toc-section">
        <div class="toc-section-title">${s.title}</div>
        <ul class="toc-list">
          ${s.items.map(it => `<li data-idx="${it.idx}">${it.label}</li>`).join('')}
        </ul>
      </div>
    `).join('');
    document.getElementById('tocContent').innerHTML = html;

    document.querySelectorAll('.toc-list li').forEach(li => {
      li.addEventListener('click', () => {
        const target = parseInt(li.dataset.idx);
        const dir = target > currentPage ? 'next' : 'prev';
        goTo(target, dir);
        closeToC();
      });
    });
  }
  buildToC();

  function openToC() { document.getElementById('toc').classList.add('open'); }
  function closeToC() { document.getElementById('toc').classList.remove('open'); }

  document.getElementById('menuBtn').addEventListener('click', openToC);
  document.getElementById('toc').addEventListener('click', (e) => {
    if (e.target.id === 'toc') closeToC();
  });

  // ============================================================
  // LIGHTBOX
  // ============================================================
  document.addEventListener('click', (e) => {
    const img = e.target.closest('img[data-zoom]');
    if (!img) return;
    e.stopPropagation();
    document.getElementById('lightboxImg').src = img.dataset.zoom;
    document.getElementById('lightbox').classList.add('open');
  });
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.getElementById('lightbox').addEventListener('click', closeLightbox);

  updateUI();

  // ✨ kick off animations on the first (cover) page
  requestAnimationFrame(() => {
    setTimeout(() => animatePage(pageEls[0]), 100);
  });
</script>

</body>
</html>
